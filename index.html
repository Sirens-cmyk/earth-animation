cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کره زمین تعاملی ۳ بعدی</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ۱. قوی‌تر کردن نور محیطی برای روشن شدن بخش‌های تاریک
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // ۲. تنظیم نور خورشید دقیقا پشت سر دوربین (تا کل جلو زمین روشن بشه)
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(0, 0, 5); // نور مستقیم از جلو می‌تابه
        scene.add(sunLight);

        const geometry = new THREE.SphereGeometry(2, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('earth.jpg');
        const material = new THREE.MeshStandardMaterial({ 
            map: earthTexture,
            roughness: 0.6
        });
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        camera.position.z = 4.5;

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.001; 
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
EOF
