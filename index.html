cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کره زمین تعاملی ۳ بعدی</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <script>
        // ۱. ساخت صحنه، دوربین و رندرر
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ۲. تنظیم نورها
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // ۳. ساخت کره زمین واقعی
        const geometry = new THREE.SphereGeometry(2, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('earth.jpg');
        const material = new THREE.MeshStandardMaterial({ 
            map: earthTexture,
            roughness: 0.6
        });
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        camera.position.z = 4.5;

        // ۴. اضافه کردن قابلیت کنترل با دست و موس
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // نرم کردن حرکت چرخش
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;   // اجازه دادن به زوم (بزرگنمایی و کوچکنمایی)

        // ۵. تابع انیمیشن
        function animate() {
            requestAnimationFrame(animate);
            
            // زمین خودش خیلی ملایم می‌چرخه، اما به محض اینکه با دست لمسش کنی، کنترلش میفته دست خودت
            earth.rotation.y += 0.001; 
            
            // آپدیت کردن وضعیت کنترلر در هر فریم
            controls.update(); 
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
EOF
